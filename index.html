<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantina - Pedidos Anticipados</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <!-- CABECERA -->
    <header>
        <h1>🍽️ Cantina SpeedTech</h1>
        <p>Haz tu pedido anticipado y evita las colas</p>
    </header>
    <!-- MENÚ DE PRODUCTOS -->
    <main>
        <section id="seccion-menu">
            <h2>📋 Nuestro Menú</h2>

            <!-- Selector de franja horaria -->
            <div id="seccion-franja">
                <h3>🕐 ¿Para qué recreo es tu pedido?</h3>
                <div id="botones-franja"></div>
            </div>

            <!-- Categoría Bebidas -->
            <div class="categoria">
                <h3>☕ Bebidas</h3>
                <div class="productos" id="bebidas">
                    <!-- Los productos se cargan desde JavaScript -->
                </div>
            </div>

            <!-- Categoría Bocadillos -->
            <div class="categoria">
                <h3>🥖 Bocadillos</h3>
                <div class="productos" id="bocadillos">
                    <!-- Los productos se cargan desde JavaScript -->
                </div>
            </div>

            <!-- Categoría Tostadas -->
            <div class="categoria">
                <h3>🍞 Tostadas</h3>
                <div class="productos" id="tostadas">
                    <!-- Los productos se cargan desde JavaScript -->
                </div>
            </div>
        </section>

        <!-- Total del pedido -->
        <div class="barra-total">
            <span>Total del pedido:</span>
            <span id="total">0.00 €</span>
        </div>

        <!-- Resumen del pedido -->
        <div id="seccion-resumen" style="display:none;">
            <h2>🧾 Resumen de tu pedido</h2>
            <p id="franja-elegida"></p>
            <ul id="lista-resumen"></ul>
            <p class="total-resumen">Total: <span id="total-resumen">0.00 €</span></p>
            <button id="btn-confirmar">✅ Confirmar pedido</button>
        </div>

    </main>
    <script src="js/carrito.js"></script>
    <script src="js/menu.js"></script>
</body>

</html>
