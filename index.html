<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantina - Pedidos Anticipados</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- CABECERA -->
    <header>
        <h1>🍽️ Cantina del Centro</h1>
        <p>Haz tu pedido anticipado y evita las colas</p>
    </header>
    <!-- MENÚ DE PRODUCTOS -->
    <main>
        <section id="seccion-menu">
            <h2>📋 Nuestro Menú</h2>

            <!-- Categoría Bebidas -->
            <div class="categoria">
                <h3>☕ Bebidas</h3>
                <div class="productos" id="bebidas">
                    <!-- Los productos se cargan desde JavaScript -->
                </div>
            </div>

            <!-- Categoría Bocadillos -->
            <div class="categoria">
                <h3>🥖 Bocadillos</h3>
                <div class="productos" id="bocadillos">
                    <!-- Los productos se cargan desde JavaScript -->
                </div>
            </div>

            <!-- Categoría Tostadas -->
            <div class="categoria">
                <h3>🍞 Tostadas</h3>
                <div class="productos" id="tostadas">
                    <!-- Los productos se cargan desde JavaScript -->
                </div>
            </div>
        </section>
    </main>
    <script src="js/menu.js"></script>
</body>

</html>
